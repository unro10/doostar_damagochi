<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐹 뚜별 햄스터 키우기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════
       상단 캐시 바
  ══════════════════════════════ -->
  <div class="cash-bar">
    <span>💰 캐시: <strong id="cash-display">0</strong>C</span>
    <button class="icon-btn" onclick="openAchievements()">🏆 업적</button>
  </div>

  <!-- ══════════════════════════════
       메인 게임 화면
  ══════════════════════════════ -->
  <div id="game-screen">

    <!-- 단계 / 이름 -->
    <div id="stage-label">이름: 뚜스터 | 단계: 아기 🍼 | ⏰ 0분 경과</div>

    <!-- 햄스터 이미지 -->
    <div class="hamster-box">
      <img id="hamster-img" src="images/happy.png" alt="햄스터" />
    </div>

    <!-- 상태 메시지 -->
    <div id="state-msg">😊 뚜스터가 행복해요!</div>

    <!-- 경고 메시지 -->
    <div id="warn-msg"></div>

    <!-- 액션 메시지 -->
    <div id="action-msg"></div>

    <!-- 스탯 바 -->
    <div class="stat-list">

      <div class="stat-row">
        <span class="stat-label">🛁 청결</span>
        <div class="bar-track">
          <div class="bar-fill good" id="bar-cleanliness"></div>
        </div>
        <span class="stat-val" id="val-cleanliness">100%</span>
      </div>

      <div class="stat-row">
        <span class="stat-label">😊 행복</span>
        <div class="bar-track">
          <div class="bar-fill good" id="bar-happiness"></div>
        </div>
        <span class="stat-val" id="val-happiness">100%</span>
      </div>

      <div class="stat-row">
        <span class="stat-label">🍽️ 배고픔</span>
        <div class="bar-track">
          <div class="bar-fill good" id="bar-hunger"></div>
        </div>
        <span class="stat-val" id="val-hunger">100%</span>
      </div>

      <div class="stat-row">
        <span class="stat-label">❤️ 건강</span>
        <div class="bar-track">
          <div class="bar-fill good" id="bar-health"></div>
        </div>
        <span class="stat-val" id="val-health">100%</span>
      </div>

    </div>

    <!-- 액션 버튼 -->
    <div class="action-btns">
      <button class="action-btn" onclick="actionFeed()">
        🥕 밥주기<br /><small>(${COSTS.feed}C)</small>
      </button>
      <button class="action-btn" onclick="actionClean()">
        🛁 씻기기<br /><small>(${COSTS.clean}C)</small>
      </button>
      <button class="action-btn" onclick="actionMedicine()">
        💊 약주기<br /><small>(${COSTS.medicine}C)</small>
      </button>
      <button class="action-btn" onclick="openMinigame()">
        🎮 미니게임
      </button>
    </div>

  </div><!-- /#game-screen -->

  <!-- ══════════════════════════════
       미니게임 화면 (hidden)
  ══════════════════════════════ -->
  <div id="minigame-screen" class="hidden">

    <!-- 게임 선택 -->
    <div id="mg-select">
      <h2>🎮 미니게임 선택</h2>
      <p class="mg-sub">이겨서 캐시를 모아요!</p>
      <div class="mg-game-list">
        <button class="mg-game-btn" onclick="selectGame('guess')">
          <span class="mg-game-icon">🔢</span>
          <span class="mg-game-name">숫자 맞히기</span>
          <span class="mg-game-desc">1~10 숫자를 맞혀요</span>
        </button>
        <button class="mg-game-btn" onclick="selectGame('rps')">
          <span class="mg-game-icon">✂️</span>
          <span class="mg-game-name">가위바위보</span>
          <span class="mg-game-desc">햄스터와 대결!</span>
        </button>
        <button class="mg-game-btn" onclick="selectGame('memory')">
          <span class="mg-game-icon">🧠</span>
          <span class="mg-game-name">기억력 게임</span>
          <span class="mg-game-desc">순서를 기억하세요</span>
        </button>
      </div>
      <button class="mg-back-btn" onclick="closeMinigame()">← 돌아가기</button>
    </div>

    <!-- 게임 플레이 영역 -->
    <div id="mg-play" class="hidden"></div>

  </div><!-- /#minigame-screen -->

  <!-- ══════════════════════════════
       JS 로드 순서 중요!
  ══════════════════════════════ -->
  <script src="game.js"></script>
  <script src="achievement.js"></script>
  <script src="minigame.js"></script>

</body>
</html>
