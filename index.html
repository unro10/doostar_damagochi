<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐹 뚜별 햄스터 키우기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 타이틀 ── -->
  <header>
    <h1>🐹 뚜별 햄스터 키우기</h1>
    <p id="stage-label">이름: 뚜스터 | 단계: 아기 🍼 | ⏰ 0분 경과</p>
  </header>

  <!-- ── 햄스터 이미지 ── -->
  <section class="hamster-box">
    <img id="hamster-img" src="images/happy.png" alt="뚜스터" />
    <p id="state-msg">😊 뚜스터가 행복해요!</p>
  </section>

  <!-- ── 상태바 ── -->
  <section class="stats-box">

    <div class="stat-row">
      <span class="stat-label">🛁 청결도</span>
      <div class="bar-bg">
        <div class="bar-fill" id="bar-cleanliness" style="width:100%"></div>
      </div>
      <span class="stat-val" id="val-cleanliness">100%</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">💕 행복도</span>
      <div class="bar-bg">
        <div class="bar-fill" id="bar-happiness" style="width:100%"></div>
      </div>
      <span class="stat-val" id="val-happiness">100%</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">🥕 포만감</span>
      <div class="bar-bg">
        <div class="bar-fill" id="bar-hunger" style="width:100%"></div>
      </div>
      <span class="stat-val" id="val-hunger">100%</span>
    </div>

    <div class="stat-row">
      <span class="stat-label">❤️ 건강도</span>
      <div class="bar-bg">
        <div class="bar-fill" id="bar-health" style="width:100%"></div>
      </div>
      <span class="stat-val" id="val-health">100%</span>
    </div>

  </section>

  <!-- ── 경고 메시지 ── -->
  <p id="warn-msg"></p>

  <!-- ── 버튼 ── -->
  <section class="btn-box">
    <button class="btn btn-feed"     onclick="actionFeed()">🥕 밥 주기</button>
    <button class="btn btn-clean"    onclick="actionClean()">🛁 씻기기</button>
    <button class="btn btn-play"     onclick="actionPlay()">🎮 놀아주기</button>
    <button class="btn btn-medicine" onclick="actionMedicine()">💊 약 먹이기</button>
  </section>

  <!-- ── 액션 결과 메시지 ── -->
  <p id="action-msg"></p>

  <script src="game.js"></script>
</body>
</html>
